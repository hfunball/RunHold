name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.2
        required: true
        default: 1.2
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  github-portable:
    runs-on: windows-latest
    env:
      RUNHOLD_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test
        run: dotnet test --configuration Release --no-build
      - name: Restore publish runtime
        run: dotnet restore src/RunHold/RunHold.csproj --runtime win-x64
      - name: Publish portable artifact
        shell: pwsh
        run: ./scripts/publish-github.ps1 -Version $env:RUNHOLD_VERSION
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: RunHold-${{ env.RUNHOLD_VERSION }}-win-x64-portable
          path: |
            artifacts/release/*.zip
            artifacts/release/*.sha256.txt
      - name: Upload release assets
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload $env:RELEASE_TAG artifacts/release/* --clobber
